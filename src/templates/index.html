<html>
  <head>
    <meta charset="utf-8" />

    <style>
      body {

        font-family: sans-serif;
      }
      h1 {
        font-weight: normal;
        font-size: 140%;
      }
    </style>

  <body>
    <p>
      This is a simple demo of generating code from blocks and running the code
      using eval.
    </p>

    <p>
      &rarr; More info on
      <a
        href="https://developers.google.com/blockly/guides/configure/web/code-generators"
        >Code Generators</a
      >
      and
      <a
        href="https://developers.google.com/blockly/guides/app-integration/running-javascript"
        >Running JavaScript</a
      >.
    </p>

    <p>
      <button onclick="showCode()">Show Python Code</button>
      <!--
      <button onclick="runCode()">Run JavaScript</button>
      <form action='/jsonrpi' method='post'>
        <input id='example' type='hidden' name='name'>
	<input type='submit' value='Run JS on Rpi' onclick="returnCode()">
      </form>
      -->
      <button onclick="run_python()" class="btn btn-primary btn-custom-rounded btn-dark mt-5">Run on Rpi</button>
      <button onclick="sendCode()">Run on Rpi socket</button>
      <button onclick="saveBlock()">Save Block</button>
      <button onclick="loadBlock()">Open Block</button>
    </p>

    <div id="blocklyDiv" style="height: 480px; width: 600px"></div>

    <script>
      var toolbox = {
        kind: 'categoryToolbox',
        contents: [
          {
            kind: 'category',
            name: 'Logic',
            categorystyle: 'logic_category',
            contents: [
              {
                kind: 'block',
                type: 'controls_if',
              },
              {
                kind: 'block',
                type: 'logic_compare',
              },
              {
                kind: 'block',
                type: 'logic_operation',
              },
              {
                kind: 'block',
                type: 'logic_negate',
              },
              {
                kind: 'block',
                type: 'logic_boolean',
              },
            ],
          },
          {
            kind: 'category',
            name: 'Loops',
            categorystyle: 'loop_category',
            contents: [
              {
                kind: 'block',
                type: 'controls_repeat_ext',
                inputs: {
                  TIMES: {
                    block: {
                      type: 'math_number',
                      fields: {
                        NUM: 10,
                      },
                    },
                  },
                },
              },
              {
                kind: 'block',
                type: 'controls_whileUntil',
              },
              {
                kind: 'block',
                type: 'controls_for',
                inputs: {
                  FROM: {
                    block: {
                      type: 'math_number',
                      fields: {
                        NUM: 1
                      },
                    },
                  },
                  TO: {
                    block: {
                      type: 'math_number',
                      fields: {
                        NUM: 10
                      },
                    },
                  },
                  BY: {
                    block: {
                      type: 'math_number',
                      fields: {
                        NUM: 1
                      },
                    },
                  },
                },
              },
              {
                kind: 'block',
                type: 'controls_flow_statements'
              },
            ],
          },
          {
            kind: 'category',
            name: 'Math',
            categorystyle: 'math_category',
            contents: [
              {
                kind: 'block',
                type: 'math_number',
                fields: {
                  NUM: 123,
                },
              },
              {
                kind: 'block',
                type: 'math_arithmetic',
              },
              {
                kind: 'block',
                type: 'math_single',
              },
              {
                kind: 'block',
                type: 'math_round',
                inputs: {
                  NUM: {
                    block: {
                      type: 'math_number',
                      fields: {
                        NUM: 3.14
                      },
                    },
                  },
                }
              },
              {
                kind: 'block',
                type: 'math_modulo',
                inputs: {
                  DIVIDEND: {
                    block: {
                      type: 'math_number',
                      fields: {
                        NUM: 64
                      },
                    },
                  },
                  DIVISOR: {
                    block: {
                      type: 'math_number',
                      fields: {
                        NUM: 10
                      },
                    },
                  },
                },
              },
              {
                kind: 'block',
                type: 'math_random_int',
                inputs: {
                  FROM: {
                    block: {
                      type: 'math_number',
                      fields: {
                        NUM: 1
                      },
                    },
                  },
                  TO: {
                    block: {
                      type: 'math_number',
                      fields: {
                        NUM: 100
                      },
                    },
                  },
                },
              },
            ],
          },
          {
            kind: 'category',
            name: 'Text',
            categorystyle: 'text_category',
            contents: [
              {
                kind: 'block',
                type: 'text',
              },
              {
                kind: 'block',
                type: 'text_length',
              },
              {
                kind: 'block',
                type: 'text_print',
              },
            ],
          },
          {
            kind: 'category',
            name: 'Variables',
            categorystyle: 'variable_category',
            custom: 'VARIABLE',
          },
          {
            kind: 'category',
            name: 'RPi',
            categorystyle: 'text_category',
            contents: [
              {
                kind: 'block',
                type: 'text_print',
              },
              {
                kind: 'block',
                type: 'average',
              },
	      {
                kind: 'block',
		type: 'gpio_out_ctl',
	      },
	      {
		kind: 'block',
		type: 'sleep',
	      },
            ],
          },
        ],
      };

      var demoWorkspace = Blockly.inject('blocklyDiv', {
//        media: './node_modules/blockly/media/',
        toolbox: toolbox,
      });

      var startBlocks = {
        blocks: {
          languageVersion: 0,
          blocks: [
            {
              type: 'text_print',
	      inputs: {},
            },
          ],
        },
      };
      Blockly.serialization.workspaces.load(startBlocks, demoWorkspace);

      function showCode() {
        // Generate JavaScript code and display it.
	python.pythonGenerator.INFINITE_LOOP_TRAP = null;
	  var code =
	    python.pythonGenerator.workspaceToCode(demoWorkspace);
        alert(code);
      }

      function run_python() {
	python.pythonGenerator.INFINITE_LOOP_TRAP = null;
	var code =
	  python.pythonGenerator.workspaceToCode(demoWorkspace);
	console.log(code);
	fetch(`/jsonrpi`, {
          method: 'POST',
	  headers: {
                        'Content-Type': 'application/json'
                    },
	  body: JSON.stringify(code)
          })
	  .then(response => response.text())
	  .then(data => console.log(data))
      }

// add 0331 from here
//	const socket = io();
//     	const socket = io("wss://192.168.11.11:334");

        function sendCode() {
//            const code = document.getElementById("codeInput").value
//            document.getElementById("output").innerText = "実行中...";
            	python.pythonGenerator.INFINITE_LOOP_TRAP = null;
		var code =
          	  python.pythonGenerator.workspaceToCode(demoWorkspace);
		socket.emit('run_code', code);
        }

        socket.on('output', function (data) {
//            document.getElementById("output").innerText = data;
		console.log(data);
        });
// add 0331 by here

      async function saveBlock(){
//      button.addEventListener('click', async () => {
        const opts = {
          suggestedName: 'example',
          types: [{
            description: 'Text file',
            accept: {'text/plain': ['.txt']},
          }],
        };
        const data = Blockly.serialization.workspaces.save(demoWorkspace);
        console.log(JSON.stringify(data))
        const handle = await window.showSaveFilePicker(opts);
        const writable = await handle.createWritable()
//        await writable.write(textarea.value)
        await writable.write(JSON.stringify(data))
        await writable.close()
//      })
      }

      async function loadBlock(){
        const [handle] = await window.showOpenFilePicker({
          types: [{
            description: 'Text file',
            accept: {
              'text/plain*': [
                '.txt'
              ]
            }
          }]
        })
        const file = await handle.getFile();
        const text = await file.text();
        console.log(text)
        Blockly.Events.disable();
        Blockly.serialization.workspaces.load(JSON.parse(text), demoWorkspace);
        Blockly.Events.enable();
      }

    </script>
  </body>
</html>
