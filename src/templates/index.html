<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Blockly Demo: Generating JavaScript</title>
    <!--
    <script src="./node_modules/blockly/blockly_compressed.js"></script>
    <script src="./node_modules/blockly/blocks_compressed.js"></script>
    <script src="./node_modules/blockly/javascript_compressed.js"></script>
    <script src="./node_modules/blockly/msg/en.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/blockly@10.1.2/blockly_compressed.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/blockly@10.1.2/blocks_compressed.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/blockly@10.1.2/javascript_compressed.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/blockly@10.1.2/python_compressed.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/blockly@10.1.2/msg/en.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.7/require.js"></script>

    <!-- 自作ブロックの定義 -->
    <script src="/static/piblock.js"></script>
    <script src="/static/piblock_block.js"> </script>

    <style>
      body {
        background-color: #fff;
        font-family: sans-serif;
      }
      h1 {
        font-weight: normal;
        font-size: 140%;
      }
    </style>
  </head>
  <body>
    <p>
      This is a simple demo of generating code from blocks and running the code
      using eval.
    </p>

    <p>
      &rarr; More info on
      <a
        href="https://developers.google.com/blockly/guides/configure/web/code-generators"
        >Code Generators</a
      >
      and
      <a
        href="https://developers.google.com/blockly/guides/app-integration/running-javascript"
        >Running JavaScript</a
      >.
    </p>

    <p>
      <button onclick="showCode()">Show Python Code</button>
      <!--
      <button onclick="runCode()">Run JavaScript</button>
      <form action='/jsonrpi' method='post'>
        <input id='example' type='hidden' name='name'>
	<input type='submit' value='Run JS on Rpi' onclick="returnCode()">
      </form>
      -->
      <button onclick="run_python()" class="btn btn-primary btn-custom-rounded btn-dark mt-5">Run on Rpi</button>
    </p>

    <div id="blocklyDiv" style="height: 480px; width: 600px"></div>

    <script>
      var toolbox = {
        kind: 'categoryToolbox',
        contents: [
          {
            kind: 'category',
            name: 'Logic',
            categorystyle: 'logic_category',
            contents: [
              {
                kind: 'block',
                type: 'controls_if',
              },
              {
                kind: 'block',
                type: 'logic_compare',
              },
              {
                kind: 'block',
                type: 'logic_operation',
              },
              {
                kind: 'block',
                type: 'logic_negate',
              },
              {
                kind: 'block',
                type: 'logic_boolean',
              },
            ],
          },
          {
            kind: 'category',
            name: 'Loops',
            categorystyle: 'loop_category',
            contents: [
              {
                kind: 'block',
                type: 'controls_repeat_ext',
                inputs: {
                  TIMES: {
                    block: {
                      type: 'math_number',
                      fields: {
                        NUM: 10,
                      },
                    },
                  },
                },
              },
              {
                kind: 'block',
                type: 'controls_whileUntil',
              },
              {
                kind: 'block',
                type: 'controls_for',
                inputs: {
                  FROM: {
                    block: {
                      type: 'math_number',
                      fields: {
                        NUM: 1
                      },
                    },
                  },
                  TO: {
                    block: {
                      type: 'math_number',
                      fields: {
                        NUM: 10
                      },
                    },
                  },
                  BY: {
                    block: {
                      type: 'math_number',
                      fields: {
                        NUM: 1
                      },
                    },
                  },
                },
              },
              {
                kind: 'block',
                type: 'controls_flow_statements'
              },
            ],
          },
          {
            kind: 'category',
            name: 'Math',
            categorystyle: 'math_category',
            contents: [
              {
                kind: 'block',
                type: 'math_number',
                fields: {
                  NUM: 123,
                },
              },
              {
                kind: 'block',
                type: 'math_arithmetic',
              },
              {
                kind: 'block',
                type: 'math_single',
              },
              {
                kind: 'block',
                type: 'math_round',
                inputs: {
                  NUM: {
                    block: {
                      type: 'math_number',
                      fields: {
                        NUM: 3.14
                      },
                    },
                  },
                }
              },
              {
                kind: 'block',
                type: 'math_modulo',
                inputs: {
                  DIVIDEND: {
                    block: {
                      type: 'math_number',
                      fields: {
                        NUM: 64
                      },
                    },
                  },
                  DIVISOR: {
                    block: {
                      type: 'math_number',
                      fields: {
                        NUM: 10
                      },
                    },
                  },
                },
              },
              {
                kind: 'block',
                type: 'math_random_int',
                inputs: {
                  FROM: {
                    block: {
                      type: 'math_number',
                      fields: {
                        NUM: 1
                      },
                    },
                  },
                  TO: {
                    block: {
                      type: 'math_number',
                      fields: {
                        NUM: 100
                      },
                    },
                  },
                },
              },
            ],
          },
          {
            kind: 'category',
            name: 'Text',
            categorystyle: 'text_category',
            contents: [
              {
                kind: 'block',
                type: 'text',
              },
              {
                kind: 'block',
                type: 'text_length',
              },
              {
                kind: 'block',
                type: 'text_print',
              },
            ],
          },
          {
            kind: 'category',
            name: 'Variables',
            categorystyle: 'variable_category',
            custom: 'VARIABLE',
          },
          {
            kind: 'category',
            name: 'RPi',
            categorystyle: 'text_category',
            contents: [
              {
                kind: 'block',
                type: 'text_print',
              },
              {
                kind: 'block',
                type: 'average',
              },
	      {
                kind: 'block',
		type: 'gpio_out_ctl',
	      },
            ],
          },
        ],
      };

      var demoWorkspace = Blockly.inject('blocklyDiv', {
//        media: './node_modules/blockly/media/',
        toolbox: toolbox,
      });

      var startBlocks = {
        blocks: {
          languageVersion: 0,
          blocks: [
            {
              type: 'text_print',
	      inputs: {},
            },
          ],
        },
      };
      Blockly.serialization.workspaces.load(startBlocks, demoWorkspace);

      function showCode() {
        // Generate JavaScript code and display it.
	python.pythonGenerator.INFINITE_LOOP_TRAP = null;
	  var code =
	    python.pythonGenerator.workspaceToCode(demoWorkspace);
        alert(code);
      }

//      function returnCode() {
        // Generate JavaScript code and return it.
//	python.pythonGenerator.INFINITE_LOOP_TRAP = null;
//	var code = 
//	  python.pythonGenerator.workspaceToCode(demoWorkspace);
//	document.getElementById("example").value = code;
//      }

      function run_python() {
	python.pythonGenerator.INFINITE_LOOP_TRAP = null;
	var code =
	  python.pythonGenerator.workspaceToCode(demoWorkspace);
	fetch(`/jsonrpi`, {
          method: 'POST',
	  headers: {
                        'Content-Type': 'application/json'
                    },
	  body: JSON.stringify(code)
          })
	  .then(response => response.text())
	  .then(data => console.log(data))
      }

//      function runCode() {
        // Generate JavaScript code and run it.
//	window.LoopTrap = 1000;
//        javascript.javascriptGenerator.INFINITE_LOOP_TRAP =
//          'if (--window.LoopTrap < 0) throw "Infinite loop.";\n';
//        var code =
//          javascript.javascriptGenerator.workspaceToCode(demoWorkspace);
//        javascript.javascriptGenerator.INFINITE_LOOP_TRAP = null;
//        try {
//          eval(code);
//        } catch (e) {
//          alert(e);
//        }
//      }
    </script>
  </body>
</html>
